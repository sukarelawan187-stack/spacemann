<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 PORTAL GAME VIRAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght=500;700&display=swap');
        body { font-family: 'Chakra Petch', sans-serif; background:#020617; color:white; text-align:center; margin:0; padding:20px; }
        .container { max-width:500px; margin:auto; background:#0f172a; padding:25px; border:3px solid #38bdf8; border-radius:15px; box-shadow: 0 0 20px rgba(56,189,248,0.2); }
        button { width:100%; padding:15px; margin:10px 0; font-size:16px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; font-family:inherit; }
        .btn-blue { background:#38bdf8; color:black; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        input { width:90%; padding:12px; margin:8px 0; background:#1e293b; color:white; border:1px solid #475569; border-radius:8px; font-family:inherit; text-align:center; font-size:16px; }
        .menu-box { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px; }
        .game-card { background:#1e293b; border:2px solid #475569; padding:20px; border-radius:12px; cursor:pointer; transition:0.2s; }
        .game-card:hover { border-color:#facc15; transform:scale(1.03); }
        .game-card h3 { margin:10px 0 0 0; font-size:14px; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎮 GAME VIRAL PORTAL</h2>
    <hr style="border-color:#38bdf8; margin-bottom:20px;">

    <div id="authPage">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" class="btn-blue">MASUK (LOGIN)</button>
        <button onclick="register()" class="btn-green">DAFTAR AKUN BARU</button>
    </div>

    <div id="menuPage" style="display:none;">
        <p style="font-size:14px;">Selamat Datang, <b id="currUser" style="color:#facc15;"></b></p>
        <p style="font-size:18px; font-weight:bold; color:#22c55e;">Saldo: <span id="saldo">Rp 0</span></p>
        
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button onclick="window.open('https://sociabuzz.com/bolapredik/tribe', '_blank')" class="btn-green" style="padding:8px; font-size:12px;">💰 TOP UP</button>
            <button onclick="bukaWD()" class="btn-red" style="padding:8px; font-size:12px;">💸 TARIK (WD)</button>
        </div>

        <h3 style="margin-top:25px; font-size:14px; color:#94a3b8;">👇 PILIH PERMAINAN ANDA 👇</h3>
        
        <div class="menu-box">
            <div class="game-card" onclick="pilihGame('spaceman.html')">
                <span style="font-size:40px;">🚀</span>
                <h3>SPACEMAN CRASH</h3>
            </div>
            <div class="game-card" onclick="pilihGame('mahjong.html')">
                <span style="font-size:40px;">🀄</span>
                <h3>MAHJONG SCATTER</h3>
            </div>
        </div>

        <button onclick="logout()" class="btn-red" style="margin-top:30px; padding:10px; font-size:12px; width:50%;">🚪 LOGOUT</button>
    </div>

    <div id="wdPage" style="display:none;">
        <h3>💸 FORMULIR TARIK SALDO</h3>
        <input type="number" id="wdAmount" placeholder="Jumlah WD (Rp)">
        <input type="text" id="wdBank" placeholder="Nama Bank / E-Wallet (DANA/BCA/dll)">
        <input type="text" id="wdNomer" placeholder="Nomor Rekening / HP">
        <button onclick="kirimWD()" class="btn-green">KIRIM PERMINTAAN WD</button>
        <button onclick="tutupWD()" class="btn-red">BATAL</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM",
  authDomain: "spaceman-sukses.firebaseapp.com",
  projectId: "spaceman-sukses",
  storageBucket: "spaceman-sukses.firebasestorage.app",
  messagingSenderId: "442967300277",
  appId: "1:442967300277:web:65b99aebdbc478455586fc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currentUser = null; let currentSaldo = 0;

async function register() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) return alert("Isi username & password!");
    const check = await db.collection("users").doc(user).get();
    if(check.exists) return alert("Username sudah terpakai!");
    await db.collection("users").doc(user).set({password: pass, saldo: 0, statusOnline: "OFFLINE", isBanned: false});
    alert("✅ Registrasi Berhasil! Silakan Login.");
}

async function login() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    const doc = await db.collection("users").doc(user).get();
    if (doc.exists && doc.data().password === pass) {
        if(doc.data().isBanned === true) return alert("❌ Akun Anda diblokir oleh admin!");
        currentUser = user;
        localStorage.setItem("game_user", user);
        await db.collection("users").doc(user).update({ statusOnline: "ONLINE" });
        
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('menuPage').style.display = 'block';
        document.getElementById('currUser').textContent = user;
        
        db.collection("users").doc(user).onSnapshot((uDoc) => {
            if(uDoc.exists) {
                currentSaldo = uDoc.data().saldo || 0;
                document.getElementById("saldo").textContent = `Rp ${currentSaldo.toLocaleString()}`;
                if(uDoc.data().isBanned === true) location.reload();
            }
        });
    } else { alert("❌ Username atau Password salah!"); }
}

function pilihGame(url) {
    if(!currentUser) return;
    window.location.href = url;
}

function logout() {
    if(currentUser) db.collection("users").doc(currentUser).update({ statusOnline: "OFFLINE" });
    localStorage.clear();
    location.reload();
}

function bukaWD() { document.getElementById("menuPage").style.display = "none"; document.getElementById("wdPage").style.display = "block"; }
function tutupWD() { document.getElementById("wdPage").style.display = "none"; document.getElementById("menuPage").style.display = "block"; }

async function kirimWD() {
    const amount = parseInt(document.getElementById('wdAmount').value); const bank = document.getElementById('wdBank').value.trim(); const nomer = document.getElementById('wdNomer').value.trim();
    if (!amount || !bank || !nomer) return alert("Lengkapi data WD!");
    if (amount < 50000) return alert("❌ Minimal WD Rp 50.000!");
    if (amount > currentSaldo) return alert("❌ Saldo tidak mencukupi!");

    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(-amount) });
    await db.collection("withdraw_requests").add({ username: currentUser, jumlah: amount, tujuan: bank, rekening: nomer, status: "PENDING", waktu: firebase.firestore.FieldValue.serverTimestamp() });
    alert("🚀 Permintaan WD berhasil dikirim ke Admin!");
    tutupWD();
}
</script>
</body>
</html>
