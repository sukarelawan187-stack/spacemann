<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 SPACEMAN PLAYER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background:#0a0a1f; color:white; text-align:center; margin:0; padding:10px; }
        .container { max-width:650px; margin:auto; background:#1a1a2e; padding:15px; border:4px solid #22d3ee; border-radius:15px; position: relative; overflow: hidden; }
        button { width:100%; padding:15px; margin:8px 0; font-size:16px; border:none; border-radius:50px; cursor:pointer; font-family:inherit; }
        .btn-blue { background:#22d3ee; color:black; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-yellow { background:#facc15; color:black; }
        input, select { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; font-family:inherit; text-align:center; }
        #multiplier { font-size:52px; margin:20px 0; color:#22d3ee; text-shadow: 0 0 10px #22d3ee; }
        .status-text { font-size: 13px; margin: 10px 0; color: #facc15; min-height: 20px; }
        .crash-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(239, 68, 68, 0.85); color: white; flex-direction: column; justify-content: center; align-items: center; z-index: 10; font-size: 32px; font-weight: bold; text-shadow: 0 0 10px black; animation: shake 0.3s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(0px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(2px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(2px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); } }
        
        .game-visual { height: 120px; margin: 15px auto; display: flex; justify-content: center; align-items: center; position: relative; background: #0f172a; border-radius: 10px; border: 2px solid #334155; overflow: hidden; }
        .rocket-img { font-size: 50px; display: none; animation: floatRocket 0.5s ease-in-out infinite alternate; }
        @keyframes floatRocket { from { transform: translateY(0px) rotate(45deg); } to { transform: translateY(-15px) rotate(45deg); } }
        .stars-bg { position: absolute; width:100%; height:100%; background: radial-gradient(white, transparent 10%); background-size: 20px 20px; display:none; animation: moveStars 1s linear infinite; }
        @keyframes moveStars { from { background-position: 0 0; } to { background-position: 0 40px; } }
    </style>
</head>
<body>
<div class="container">
    <div id="crashScreen" class="crash-overlay">💥 CRASHED! 💥</div>
    <h1>🚀 SPACEMAN</h1>
    <div id="authPage">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" class="btn-blue">LOGIN</button>
        <button onclick="register()" class="btn-green">DAFTAR</button>
    </div>
    
    <div id="gamePage" style="display:none;">
        <p>User: <b id="currUser"></b></p>
        <p>Saldo: <span id="saldo" style="color:#22d3ee;">Rp 0</span></p>
        <button onclick="bukaSociabuzz()" class="btn-yellow" style="background:#facc15;">💰 ISI SALDO / TOP UP</button>
        <button onclick="refreshSaldo()" class="btn-green">🔄 REFRESH SALDO</button>
        <button onclick="showWD()" class="btn-red">💸 TARIK SALDO (WD)</button>
        
        <div class="game-visual">
            <div id="starsAnimation" class="stars-bg"></div>
            <div id="rocketIcon" class="rocket-img">🚀</div>
        </div>

        <div id="gameStatus" class="status-text">⏱️ MENUNGGU TARUHAN...</div>
        <h2 id="multiplier">1.00x</h2>

        <input type="number" id="taruhan" value="5000">
        <button id="startBtn" onclick="pasangTaruhan()" class="btn-blue">BET / PASANG TARUHAN</button>
        <button id="cashoutBtn" onclick="cashOut()" style="display:none;" class="btn-yellow">💰 CASH OUT</button>
        <button onclick="logout()" class="btn-red" style="padding:8px; font-size:12px; border-radius:10px; margin-top:20px;">🚪 LOGOUT</button>
    </div>

    <div id="wdPage" style="display:none;">
        <h3>💸 TARIK SALDO</h3>
        <p style="font-size:10px; color:#ef4444;">Minimal Penarikan: Rp 50.000</p>
        <input type="number" id="wdAmount" placeholder="Jumlah WD (Rp)">
        <select id="wdBank">
            <option value="DANA">DANA</option>
            <option value="GOPAY">GOPAY</option>
            <option value="OVO">OVO</option>
            <option value="BANK BCA">BANK BCA</option>
            <option value="BANK MANDIRI">BANK MANDIRI</option>
            <option value="BANK BRI">BANK BRI</option>
        </select>
        <input type="text" id="wdNomer" placeholder="No Rekening">
        <button onclick="kirimWD()" class="btn-green">KIRIM PERMINTAAN</button>
        <button onclick="hideWD()" class="btn-red">BATAL</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM",
  authDomain: "spaceman-sukses.firebaseapp.com",
  projectId: "spaceman-sukses",
  storageBucket: "spaceman-sukses.firebasestorage.app",
  messagingSenderId: "442967300277",
  appId: "1:442967300277:web:65b99aebdbc478455586fc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currentUser = null; let currentSaldo = 0; let betAmount = 0; let sudahTaruhan = false;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    try {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'bet') { osc.frequency.setValueAtTime(440, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.15); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.15); }
        else if (type === 'countdown') { osc.frequency.setValueAtTime(600, audioCtx.currentTime); gain.gain.setValueAtTime(0.2, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.1); }
        else if (type === 'fly') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(300, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.04, audioCtx.currentTime); osc.start(); window.currentFlySound = {osc, gain}; }
        else if (type === 'win') { osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); gain.gain.setValueAtTime(0.4, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.3); }
        else if (type === 'crash') { osc.type = 'triangle'; osc.frequency.setValueAtTime(100, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(10, audioCtx.currentTime + 0.4); gain.gain.setValueAtTime(0.6, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
    } catch(e){}
}
function stopFlySound() { if(window.currentFlySound) { try { window.currentFlySound.osc.stop(); }catch(e){} window.currentFlySound = null; } }

function bukaSociabuzz() { window.open("https://sociabuzz.com/bolapredik/tribe", "_blank"); }

async function register() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) return alert("Isi data!");
    await db.collection("users").doc(user).set({password: pass, saldo: 0, statusOnline: "OFFLINE"});
    alert("✅ Berhasil daftar!");
}
async function login() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    const doc = await db.collection("users").doc(user).get();
    if (doc.exists && doc.data().password === pass) {
        currentUser = user;
        await db.collection("users").doc(user).update({ statusOnline: "ONLINE" });
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('gamePage').style.display = 'block';
        document.getElementById('currUser').textContent = user;
        updateSaldoBiasa(); listenToAdminGame();
        
        window.addEventListener('beforeunload', function () {
            db.collection("users").doc(currentUser).update({ statusOnline: "OFFLINE" });
        });
    } else { alert("❌ Salah!"); }
}
async function logout() {
    if (currentUser) {
        await db.collection("users").doc(currentUser).update({ statusOnline: "OFFLINE" });
        location.reload();
    }
}
async function updateSaldoBiasa() {
    if (!currentUser) return;
    const doc = await db.collection("users").doc(currentUser).get();
    if (doc.exists) { currentSaldo = doc.data().saldo || 0; document.getElementById('saldo').textContent = `Rp ${currentSaldo.toLocaleString()}`; }
}
function refreshSaldo() { updateSaldoBiasa(); alert("✅ Di-refresh!"); }

let lastStatus = "";
function listenToAdminGame() {
    db.collection("game_room").doc("live_match").onSnapshot((doc) => {
        if (!doc.exists) return;
        const data = doc.data();
        const status = data.status || "WAITING";
        const multiplier = data.currentMultiplier || 1.00;
        const countdown = data.countdown !== undefined ? data.countdown : 0;
        
        document.getElementById('multiplier').textContent = multiplier.toFixed(2) + "x";

        if (status === "COUNTDOWN") {
            stopFlySound();
            document.getElementById('crashScreen').style.display = 'none';
            document.getElementById('rocketIcon').style.display = 'none';
            document.getElementById('starsAnimation').style.display = 'none';
            document.getElementById('gameStatus').textContent = `🚨 MELUNCUR DALAM: ${countdown} DETIK!`;
            document.getElementById('gameStatus').style.color = "#facc15";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').style.opacity = "1";
            document.getElementById('cashoutBtn').style.display = 'none';
            if(countdown > 0 && lastStatus !== countdown) { playSound('countdown'); }
            lastStatus = countdown;
        }
        else if (status === "WAITING") {
            stopFlySound();
            document.getElementById('crashScreen').style.display = 'none';
            document.getElementById('rocketIcon').style.display = 'none';
            document.getElementById('starsAnimation').style.display = 'none';
            document.getElementById('gameStatus').textContent = "⏱️ MENUNGGU ROUND BARU...";
            document.getElementById('gameStatus').style.color = "#facc15";
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').style.opacity = "1";
            document.getElementById('cashoutBtn').style.display = 'none';
        } 
        else if (status === "TERBANG") {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').style.opacity = "0.5";
            document.getElementById('gameStatus').textContent = "🚀 ROKET SEDANG TERBANG!";
            document.getElementById('gameStatus').style.color = "#22d3ee";
            document.getElementById('rocketIcon').style.display = 'block';
            document.getElementById('starsAnimation').style.display = 'block';

            if (!window.currentFlySound) playSound('fly');
            if (sudahTaruhan) document.getElementById('cashoutBtn').style.display = 'inline-block';
        } 
        else if (status === "CRASH") {
            stopFlySound();
            document.getElementById('rocketIcon').style.display = 'none';
            document.getElementById('starsAnimation').style.display = 'none';
            if (document.getElementById('crashScreen').style.display !== 'flex') playSound('crash');
            document.getElementById('crashScreen').style.display = 'flex';
            document.getElementById('gameStatus').textContent = "💥 BOOM! ROKET MELEDAK!";
            document.getElementById('gameStatus').style.color = "#ef4444";
            document.getElementById('cashoutBtn').style.display = 'none';
            sudahTaruhan = false; updateSaldoBiasa();
        }
    });
}

async function pasangTaruhan() {
    if (sudahTaruhan) return alert("Sudah pasang taruhan!");
    const bet = parseInt(document.getElementById('taruhan').value);
    
    // Validasi Minimal Bet 2.000
    if (bet < 2000) return alert("❌ Minimal Taruhan adalah Rp 2.000!");
    if (bet > currentSaldo || bet <= 0) return alert("Saldo kurang!");
    
    playSound('bet');
    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(-bet) });
    await db.collection("live_bets").doc(currentUser).set({ username: currentUser, jumlah: bet });
    
    betAmount = bet; sudahTaruhan = true; currentSaldo -= bet; 
    document.getElementById('saldo').textContent = `Rp ${currentSaldo.toLocaleString()}`;
    alert("✅ Taruhan Berhasil Dipasang!");
}

async function cashOut() {
    if (!sudahTaruhan) return;
    sudahTaruhan = false;
    document.getElementById('cashoutBtn').style.display = 'none';
    const liveMult = parseFloat(document.getElementById('multiplier').textContent);
    const win = Math.floor(betAmount * liveMult);
    
    playSound('win');
    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(win) });
    alert(`🎉 MENANG Rp ${win.toLocaleString()}`);
    updateSaldoBiasa();
}

function showWD() { document.getElementById('gamePage').style.display = 'none'; document.getElementById('wdPage').style.display = 'block'; }
function hideWD() { document.getElementById('wdPage').style.display = 'none'; document.getElementById('gamePage').style.display = 'block'; }
async function kirimWD() {
    const amount = parseInt(document.getElementById('wdAmount').value);
    const bank = document.getElementById('wdBank').value;
    const nomer = document.getElementById('wdNomer').value.trim();
    if (!amount || !nomer) return alert("Isi semua data!");
    
    // Validasi Minimal WD Rp 50.000
    if (amount < 50000) return alert("❌ Minimal Tarik Saldo (WD) adalah Rp 50.000!");
    if (amount > currentSaldo) return alert("❌ Saldo tidak cukup!");

    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(-amount) });
    await db.collection("withdraw_requests").add({ username: currentUser, jumlah: amount, tujuan: bank, rekening: nomer, status: "PENDING", waktu: firebase.firestore.FieldValue.serverTimestamp() });
    alert("🚀 WD terkirim!"); updateSaldoBiasa(); hideWD();
}
</script>
</body>
</html>
