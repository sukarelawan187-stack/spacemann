<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>🚀 SPACEMAN GAME</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="authPage">
        <input id="u" placeholder="Username"><input id="p" type="password" placeholder="Pass">
        <button onclick="login()">LOGIN</button>
    </div>
    <div id="gamePage" style="display:none;">
        <p>Saldo: <span id="saldo">0</span></p>
        <button onclick="bukaWD()">💸 WITHDRAW</button>
    </div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM", authDomain: "spaceman-sukses.firebaseapp.com", projectId: "spaceman-sukses", storageBucket: "spaceman-sukses.firebasestorage.app", messagingSenderId: "442967300277", appId: "1:442967300277:web:65b99aebdbc478455586fc" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currUser = "";

async function login() {
    currUser = document.getElementById("u").value;
    document.getElementById("authPage").style.display = "none";
    document.getElementById("gamePage").style.display = "block";
    db.collection("users").doc(currUser).onSnapshot(d => document.getElementById("saldo").innerText = d.data().saldo);
}

async function bukaWD() {
    const jml = prompt("Jumlah WD:");
    const bank = prompt("Nama Bank/E-Wallet:");
    const no = prompt("Nomor Rekening:");
    
    // Potong saldo langsung
    await db.collection("users").doc(currUser).update({ saldo: firebase.firestore.FieldValue.increment(-parseInt(jml)) });
    // Kirim ke admin
    await db.collection("withdraw_requests").add({
        username: currUser, jumlah: parseInt(jml), tujuan: bank, rekening: no, status: "PENDING"
    });
    alert("WD dikirim ke Admin!");
}
</script>
</body>
</html>
