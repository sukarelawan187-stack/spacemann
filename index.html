<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 SPACEMAN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background:#0a0a1f; color:white; text-align:center; margin:0; padding:10px; }
        .container { max-width:650px; margin:auto; background:#1a1a2e; padding:15px; border:4px solid #22d3ee; border-radius:15px; }
        button { width:100%; padding:15px; margin:8px 0; font-size:16px; border:none; border-radius:50px; cursor:pointer; font-family:inherit; }
        .btn-blue { background:#22d3ee; color:black; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-yellow { background:#facc15; color:black; }
        input { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; }
        #multiplier { font-size:52px; margin:20px 0; color:#22d3ee; text-shadow: 0 0 10px #22d3ee; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 SPACEMAN</h1>
    
    <div id="authPage">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" class="btn-blue">LOGIN</button>
        <button onclick="register()" class="btn-green">DAFTAR</button>
    </div>

    <div id="gamePage" style="display:none;">
        <p>User: <b id="currUser"></b></p>
        <p>Saldo: <span id="saldo" style="color:#22d3ee;">Rp 0</span></p>
        
        <button onclick="refreshSaldo()" class="btn-green">🔄 REFRESH SALDO</button>
        <button onclick="showWithdrawForm()" class="btn-red">💸 TARIK SALDO</button>
        <button onclick="topUp()" class="btn-yellow">💰 TOP UP</button>

        <input type="number" id="taruhan" value="5000" style="width:90%;">
        <button id="startBtn" onclick="startSpaceman()" class="btn-blue">🚀 TERBANG!</button>
        <button id="cashoutBtn" onclick="cashOut()" style="display:none;background:#facc15;color:black;" class="btn-yellow">💰 CASH OUT</button>

        <h2 id="multiplier">1.00x</h2>
    </div>

    <div id="withdrawForm" style="display:none;margin-top:20px;">
        <h3>💸 Tarik Saldo</h3>
        <input type="number" id="withdrawAmount" placeholder="Jumlah">
        <select id="ewalletType">
            <option value="Dana">Dana</option>
            <option value="OVO">OVO</option>
            <option value="GoPay">GoPay</option>
        </select>
        <input type="text" id="ewalletNumber" placeholder="Nomor E-Wallet">
        <button onclick="submitWithdraw()" class="btn-red">KIRIM</button>
        <button onclick="hideWithdrawForm()" style="background:#64748b;">BATAL</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPi37cKRHWEyw0BMaUifdhS_bukrviir",
  authDomain: "spaceman187.firebaseapp.com",
  projectId: "spaceman187",
  storageBucket: "spaceman187.firebasestorage.app",
  messagingSenderId: "691135287021",
  appId: "1:691135287021:web:f36aa46cf84357a52006"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentUser = null;
let isFlying = false;
let multiplier = 1;
let crashPoint = 0;
let gameInterval = null;

async function register() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) return alert("Isi username & password!");
    await db.collection("users").doc(user).set({password: pass, saldo: 0});
    alert("✅ Akun berhasil dibuat!");
}

async function login() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    const doc = await db.collection("users").doc(user).get();
    if (doc.exists && doc.data().password === pass) {
        currentUser = user;
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('gamePage').style.display = 'block';
        document.getElementById('currUser').textContent = user;
        updateSaldo();
    } else {
        alert("❌ Username atau password salah!");
    }
}

async function updateSaldo() {
    if (!currentUser) return;
    const doc = await db.collection("users").doc(currentUser).get();
    const saldo = doc.data()?.saldo || 0;
    document.getElementById('saldo').textContent = `Rp ${saldo.toLocaleString('id-ID')}`;
}

async function refreshSaldo() { await updateSaldo(); alert("✅ Saldo di-refresh!"); }

async function startSpaceman() {
    if (!currentUser) return alert("Login dulu!");
    const bet = parseInt(document.getElementById('taruhan').value);
    if (bet < 1000) return alert("Minimal taruhan Rp 1.000!");

    const doc = await db.collection("users").doc(currentUser).get();
    if (bet > (doc.data()?.saldo || 0)) return alert("Saldo tidak cukup!");

    await db.collection("users").doc(currentUser).update({saldo: firebase.firestore.FieldValue.increment(-bet)});
    updateSaldo();

    isFlying = true;
    multiplier = 1;
    document.getElementById('startBtn').disabled = true;
    document.getElementById('cashoutBtn').style.display = 'inline-block';
    document.getElementById('multiplier').textContent = "1.00x";

    crashPoint = doc.data()?.forceCrash || (Math.random() * 8 + 1.5);

    gameInterval = setInterval(() => {
        multiplier += 0.06;
        document.getElementById('multiplier').textContent = multiplier.toFixed(2) + "x";
        if (multiplier >= crashPoint) crashGame();
    }, 90);
}

function cashOut() {
    if (!isFlying) return;
    clearInterval(gameInterval);
    isFlying = false;
    const win = Math.floor(5000 * multiplier);
    db.collection("users").doc(currentUser).update({saldo: firebase.firestore.FieldValue.increment(win)});
    updateSaldo();
    alert(`🎉 CASH OUT BERHASIL! ${multiplier.toFixed(2)}x → Rp ${win}`);
    resetGame();
}

function crashGame() {
    clearInterval(gameInterval);
    isFlying = false;
    alert(`💥 CRASH DI ${crashPoint.toFixed(2)}x!`);
    resetGame();
}

function resetGame() {
    document.getElementById('startBtn').disabled = false;
    document.getElementById('cashoutBtn').style.display = 'none';
    document.getElementById('multiplier').textContent = "1.00x";
}

function showWithdrawForm() { document.getElementById('withdrawForm').style.display = 'block'; }
function hideWithdrawForm() { document.getElementById('withdrawForm').style.display = 'none'; }
function submitWithdraw() { alert("Permintaan penarikan dikirim ke Admin!"); hideWithdrawForm(); }
function topUp() { window.open('https://sociabuzz.com/bolapredik/tribe', '_blank'); }
</script>
</body>
</html>
