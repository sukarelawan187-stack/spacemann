<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 SPACEMAN PLAYER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background:#0a0a1f; color:white; text-align:center; margin:0; padding:10px; }
        .container { max-width:650px; margin:auto; background:#1a1a2e; padding:15px; border:4px solid #22d3ee; border-radius:15px; }
        button { width:100%; padding:15px; margin:8px 0; font-size:16px; border:none; border-radius:50px; cursor:pointer; font-family:inherit; }
        .btn-blue { background:#22d3ee; color:black; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-yellow { background:#facc15; color:black; }
        input { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; font-family:inherit; }
        #multiplier { font-size:52px; margin:20px 0; color:#22d3ee; text-shadow: 0 0 10px #22d3ee; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 SPACEMAN</h1>
    <div id="authPage">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()" class="btn-blue">LOGIN</button>
        <button onclick="register()" class="btn-green">DAFTAR</button>
    </div>
    <div id="gamePage" style="display:none;">
        <p>User: <b id="currUser"></b></p>
        <p>Saldo: <span id="saldo" style="color:#22d3ee;">Rp 0</span></p>
        <button onclick="refreshSaldo()" class="btn-green">🔄 REFRESH SALDO</button>
        <input type="number" id="taruhan" value="5000">
        <button id="startBtn" onclick="pasangTaruhan()" class="btn-blue">BET / PASANG TARUHAN</button>
        <button id="cashoutBtn" onclick="cashOut()" style="display:none;" class="btn-yellow">💰 CASH OUT</button>
        <h2 id="multiplier">1.00x</h2>
    </div>
</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPi37cKRHWEyw0BMaUifdhS_bukrviirU",
  authDomain: "spaceman187.firebaseapp.com",
  projectId: "spaceman187",
  storageBucket: "spaceman187.firebasestorage.app",
  messagingSenderId: "691135287021",
  appId: "1:691135287021:web:7b7383e06141d4242006e4",
  measurementId: "G-METRZ5PYJE"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let currentUser = null; let currentSaldo = 0; let betAmount = 0; let sudahTaruhan = false; let gameStatusAktif = "WAITING"; let currentLiveMultiplier = 1.00;
async function register() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    if (!user || !pass) return alert("Isi data!");
    await db.collection("users").doc(user).set({password: pass, saldo: 0});
    alert("✅ Berhasil daftar!");
}
async function login() {
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    const doc = await db.collection("users").doc(user).get();
    if (doc.exists && doc.data().password === pass) {
        currentUser = user;
        document.getElementById('authPage').style.display = 'none';
        document.getElementById('gamePage').style.display = 'block';
        document.getElementById('currUser').textContent = user;
        updateSaldoBiasa(); listenToAdminGame();
    } else { alert("❌ Salah!"); }
}
async function updateSaldoBiasa() {
    if (!currentUser) return;
    const doc = await db.collection("users").doc(currentUser).get();
    if (doc.exists) { currentSaldo = doc.data().saldo || 0; document.getElementById('saldo').textContent = `Rp ${currentSaldo.toLocaleString()}`; }
}
function refreshSaldo() { updateSaldoBiasa(); alert("✅ Di-refresh!"); }
function listenToAdminGame() {
    db.collection("game_room").doc("live_match").onSnapshot((doc) => {
        if (!doc.exists) return;
        const data = doc.data(); gameStatusAktif = data.status || "WAITING"; currentLiveMultiplier = data.currentMultiplier || 1.00;
        document.getElementById('multiplier').textContent = currentLiveMultiplier.toFixed(2) + "x";
        if (gameStatusAktif === "TERBANG") { if (sudahTaruhan) document.getElementById('cashoutBtn').style.display = 'inline-block'; } 
        else if (gameStatusAktif === "CRASH") { document.getElementById('cashoutBtn').style.display = 'none'; sudahTaruhan = false; updateSaldoBiasa(); } 
        else { document.getElementById('cashoutBtn').style.display = 'none'; }
    });
}
async function pasangTaruhan() {
    const bet = parseInt(document.getElementById('taruhan').value);
    if (bet > currentSaldo) return alert("Saldo kurang!");
    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(-bet) });
    betAmount = bet; sudahTaruhan = true; currentSaldo -= bet; document.getElementById('saldo').textContent = `Rp ${currentSaldo.toLocaleString()}`;
}
async function cashOut() {
    if (!sudahTaruhan) return; sudahTaruhan = false; document.getElementById('cashoutBtn').style.display = 'none';
    const win = Math.floor(betAmount * currentLiveMultiplier);
    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(win) });
    alert(`🎉 Menang Rp ${win.toLocaleString()}`); updateSaldoBiasa();
}
</script>
</body>
</html>
