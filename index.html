<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL LOGIN GAME</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght=700&display=swap');
        body { font-family: 'Chakra Petch', sans-serif; background: #020617; color: white; text-align: center; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { background: #0f172a; padding: 30px; border-radius: 15px; border: 3px solid #facc15; max-width: 400px; width: 100%; box-shadow: 0 0 20px rgba(250, 204, 21, 0.2); }
        h2 { color: #facc15; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 90%; padding: 12px; margin: 15px 0; background: #1e293b; color: white; border: 1px solid #475569; border-radius: 8px; text-align: center; font-family: inherit; font-size: 16px; }
        .game-selection { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-game { padding: 15px 10px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .btn-spaceman { background: #38bdf8; color: black; box-shadow: 0 4px #0369a1; }
        .btn-spaceman:active { transform: translateY(4px); box-shadow: 0 0 #0369a1; }
        .btn-mahjong { background: #ea580c; color: white; box-shadow: 0 4px #9a3412; }
        .btn-mahjong:active { transform: translateY(4px); box-shadow: 0 0 #9a3412; }
        p { font-size: 12px; color: #94a3b8; margin-top: 15px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>PILIH & LOGIN GAME</h2>
    <p>Masukkan username Anda, lalu klik game yang ingin dimainkan:</p>
    
    <input type="text" id="usernameInput" placeholder="MASUKKAN USERNAME...">

    <div class="game-selection">
        <button class="btn-game btn-spaceman" onclick="loginKeGame('spaceman')">🚀 SPACEMAN</button>
        <button class="btn-game btn-mahjong" onclick="loginKeGame('mahjong')">🀄 MAHJONG WAYS 2</button>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM",
  authDomain: "spaceman-sukses.firebaseapp.com",
  projectId: "spaceman-sukses",
  storageBucket: "spaceman-sukses.firebasestorage.app",
  messagingSenderId: "442967300277",
  appId: "1:442967300277:web:65b99aebdbc478455586fc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function loginKeGame(pilihanGame) {
    const username = document.getElementById("usernameInput").value.trim().toLowerCase();
    if (!username) return alert("Silakan masukkan Username terlebih dahulu!");

    try {
        const userRef = db.collection("users").doc(username);
        const doc = await userRef.get();

        if (!doc.exists) {
            // Jika user baru, otomatis buat akun dengan saldo awal 0
            await userRef.set({
                saldo: 0,
                statusOnline: "ONLINE",
                isBanned: false,
                mahjongTargetWin: 0,
                waktuDaftar: firebase.firestore.FieldValue.serverTimestamp()
            });
        } else {
            // Jika user lama, cek apakah dibanned
            if (doc.data().isBanned === true) {
                return alert("❌ Akun Anda telah ditangguhkan/Banned oleh Admin!");
            }
            // Update status menjadi online
            await userRef.update({ statusOnline: "ONLINE" });
        }

        // Simpan session username di browser player
        localStorage.setItem("game_username", username);

        // Alihkan halaman sesuai game yang mereka pilih
        if (pilihanGame === 'spaceman') {
            window.location.href = "spaceman.html";
        } else if (pilihanGame === 'mahjong') {
            window.location.href = "mahjong.html";
        }

    } catch (error) {
        alert("Terjadi kesalahan jaringan database, coba lagi!");
        console.error(error);
    }
}
</script>

</body>
</html>
