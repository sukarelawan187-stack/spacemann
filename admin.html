<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 ADMIN SPACEMAN KONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background:#0a0a1f; color:white; text-align:center; margin:0; padding:15px; }
        .container { max-width:700px; margin:auto; background:#1a1a2e; padding:20px; border:4px solid #ef4444; border-radius:15px; }
        button { width:100%; padding:15px; margin:10px 0; font-size:16px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-blue { background:#22d3ee; color:black; }
        input { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; font-family:inherit; }
        .monitor-box { background: #282846; border: 2px dashed #facc15; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 12px; }
        .live-mult { font-size: 40px; color: #facc15; margin: 15px 0; text-shadow: 0 0 8px #facc15; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 ADMIN SPACEMAN</h1>

    <div class="monitor-box">
        <h3>📺 LIVE KONTROL GAME RUNNING</h3>
        <div id="statusMulai" style="color: #facc15;">⏱️ Status: WAITING (Menunggu klik terbang)</div>
        <div class="live-mult" id="adminLiveMult">1.00x</div>
        
        <button onclick="adminStartGame()" class="btn-green">🚀 TERBANGKAN ROKET (START)</button>
        <button onclick="adminCrashGame()" class="btn-red">💥 BIKIN MELEDAK (CRASH)</button>
        <button onclick="adminResetRoom()" class="btn-blue">🔄 RESET ROUND BARU</button>
    </div>
    
    <h3>💰 Tambah Saldo</h3>
    <input type="text" id="targetUser" placeholder="Username">
    <input type="number" id="addAmount" placeholder="Jumlah Saldo">
    <button onclick="addSaldo()" class="btn-green">TAMBAH SALDO</button>

    <h3>👥 Lihat User</h3>
    <button onclick="lihatSemuaUser()" class="btn-blue">LIHAT SEMUA USER</button>
</div>

<script>
// Menggunakan konfigurasi Firebase asli milikmu yang baru ketemu
const firebaseConfig = {
  apiKey: "AIzaSyAPi37cKRHWEyw0BMaUifdhS_bukrviirU",
  authDomain: "spaceman187.firebaseapp.com",
  projectId: "spaceman187",
  storageBucket: "spaceman187.firebasestorage.app",
  messagingSenderId: "691135287021",
  appId: "1:691135287021:web:7b7383e06141d4242006e4",
  measurementId: "G-METRZ5PYJE"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let adminLoop = null;
let currentMult = 1.00;

function jalankanMonitorAdmin() {
    db.collection("game_room").doc("live_match").onSnapshot((doc) => {
        if (!doc.exists) return;
        const data = doc.data();
        document.getElementById('adminLiveMult').textContent = (data.currentMultiplier || 1.00).toFixed(2) + "x";
        
        if (data.status === "TERBANG") {
            document.getElementById('statusMulai').textContent = "🚀 Roket sedang terbang di udara...";
            document.getElementById('statusMulai').style.color = "#22d3ee";
        } else if (data.status === "CRASH") {
            document.getElementById('statusMulai').textContent = "💥 Game Status: CRASHED!";
            document.getElementById('statusMulai').style.color = "#ef4444";
        } else {
            document.getElementById('statusMulai').textContent = "⏱️ Status: WAITING (Menunggu klik terbang)";
            document.getElementById('statusMulai').style.color = "#facc15";
        }
    });
}
jalankanMonitorAdmin();

function adminStartGame() {
    clearInterval(adminLoop); 
    currentMult = 1.00;

    db.collection("game_room").doc("live_match").set({
        status: "TERBANG",
        currentMultiplier: currentMult
    });

    adminLoop = setInterval(() => {
        currentMult += 0.08; 
        db.collection("game_room").doc("live_match").update({
            currentMultiplier: currentMult
        });
    }, 100);
}

function adminCrashGame() {
    clearInterval(adminLoop);
    db.collection("game_room").doc("live_match").update({
        status: "CRASH"
    });
}

function adminResetRoom() {
    clearInterval(adminLoop);
    currentMult = 1.00;
    db.collection("game_room").doc("live_match").set({
        status: "WAITING",
        currentMultiplier: 1.00
    });
}

async function addSaldo() {
    const user = document.getElementById('targetUser').value.trim().toLowerCase();
    const amount = parseInt(document.getElementById('addAmount').value);
    if (!user || !amount) return alert("Isi username & jumlah!");
    await db.collection("users").doc(user).set({saldo: firebase.firestore.FieldValue.increment(amount)}, {merge: true});
    alert(`✅ Berhasil tambah Rp ${amount} ke ${user}`);
}

async function lihatSemuaUser() {
    const snap = await db.collection("users").get();
    let txt = "DAFTAR USER:\n\n";
    snap.forEach(doc => {
        txt += `${doc.id} → Rp ${(doc.data().saldo || 0).toLocaleString('id-ID')}\n`;
    });
    alert(txt || "Belum ada user");
}
</script>
</body>
</html>
