<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 ADMIN SPACEMAN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background:#0a0a1f; color:white; text-align:center; margin:0; padding:15px; }
        .container { max-width:700px; margin:auto; background:#1a1a2e; padding:20px; border:4px solid #ef4444; border-radius:15px; }
        button { width:100%; padding:15px; margin:10px 0; font-size:16px; border:none; border-radius:8px; cursor:pointer; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-blue { background:#22d3ee; color:black; }
        input { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 ADMIN SPACEMAN</h1>
    <h3>💰 Tambah Saldo</h3>
    <input type="text" id="targetUser" placeholder="Username">
    <input type="number" id="addAmount" placeholder="Jumlah Saldo">
    <button onclick="addSaldo()" class="btn-green">TAMBAH SALDO</button>

    <h3>⚡ Force Crash</h3>
    <input type="text" id="forceUser" placeholder="Username">
    <input type="number" id="forceMult" value="3.5" step="0.1">
    <button onclick="setForceCrash()" class="btn-red">SET FORCE CRASH</button>
    <button onclick="resetForceCrash()" class="btn-blue">RESET FORCE</button>

    <h3>👥 Lihat User</h3>
    <button onclick="lihatSemuaUser()" class="btn-blue">LIHAT SEMUA USER</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAPi37cKRHWEyw0BMaUifdhS_bukrviir",
  authDomain: "spaceman187.firebaseapp.com",
  projectId: "spaceman187",
  storageBucket: "spaceman187.firebasestorage.app",
  messagingSenderId: "691135287021",
  appId: "1:691135287021:web:f36aa46cf84357a52006"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function addSaldo() {
    const user = document.getElementById('targetUser').value.trim().toLowerCase();
    const amount = parseInt(document.getElementById('addAmount').value);
    if (!user || !amount) return alert("Isi username & jumlah!");
    await db.collection("users").doc(user).set({saldo: firebase.firestore.FieldValue.increment(amount)}, {merge: true});
    alert(`✅ Berhasil tambah Rp ${amount} ke ${user}`);
}

async function setForceCrash() {
    const user = document.getElementById('forceUser').value.trim().toLowerCase();
    const mult = parseFloat(document.getElementById('forceMult').value);
    if (!user) return alert("Isi username!");
    await db.collection("users").doc(user).set({forceCrash: mult}, {merge: true});
    alert(`⚡ Force crash ${user} di ${mult}x`);
}

async function resetForceCrash() {
    const user = document.getElementById('forceUser').value.trim().toLowerCase();
    if (!user) return alert("Isi username!");
    await db.collection("users").doc(user).update({forceCrash: firebase.firestore.FieldValue.delete()});
    alert(`🔄 Force crash ${user} direset`);
}

async function lihatSemuaUser() {
    const snap = await db.collection("users").get();
    let txt = "DAFTAR USER:\n\n";
    snap.forEach(doc => {
        txt += `${doc.id} → Rp ${doc.data().saldo || 0}\n`;
    });
    alert(txt || "Belum ada user");
}
</script>
</body>
</html>
