<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>👑 PANEL ADMIN</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { background:#0a0a1f; color:white; font-family:sans-serif; padding:20px; }
        .container { max-width:600px; margin:auto; background:#1a1a2e; padding:20px; border-radius:15px; }
        .box { background:#282846; padding:15px; margin:10px 0; border-radius:8px; }
        button { padding:10px; cursor:pointer; }
        .btn-green { background:#22c55e; color:white; border:none; }
        .btn-red { background:#ef4444; color:white; border:none; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 ADMIN PANEL</h1>
    <div class="box">
        <h3>📥 PERMINTAAN WD</h3>
        <div id="wdList">Memuat...</div>
    </div>
    <div class="box">
        <h3>💰 TAMBAH SALDO</h3>
        <input type="text" id="userIn" placeholder="Username">
        <input type="number" id="amtIn" placeholder="Jumlah">
        <button onclick="addSaldo()" class="btn-green">TAMBAH</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM", authDomain: "spaceman-sukses.firebaseapp.com", projectId: "spaceman-sukses", storageBucket: "spaceman-sukses.firebasestorage.app", messagingSenderId: "442967300277", appId: "1:442967300277:web:65b99aebdbc478455586fc" };
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Tarik WD
db.collection("withdraw_requests").where("status", "==", "PENDING").onSnapshot(snap => {
    let html = "";
    snap.forEach(doc => {
        const d = doc.data();
        html += `<div style="border-bottom:1px solid #444; margin-bottom:10px;">
            <b>${d.username}</b> - Rp ${d.jumlah} (${d.tujuan}: ${d.rekening})<br>
            <button class="btn-green" onclick="prosesWD('${doc.id}', '${d.username}', ${d.jumlah}, 'BERHASIL')">APPROVE</button>
            <button class="btn-red" onclick="prosesWD('${doc.id}', '${d.username}', ${d.jumlah}, 'DITOLAK')">REJECT</button>
        </div>`;
    });
    document.getElementById("wdList").innerHTML = html || "Tidak ada request";
});

async function prosesWD(id, user, jumlah, status) {
    if(status === "DITOLAK") await db.collection("users").doc(user).update({ saldo: firebase.firestore.FieldValue.increment(jumlah) });
    await db.collection("withdraw_requests").doc(id).update({ status: status });
    alert("Proses " + status);
}

async function addSaldo() {
    const user = document.getElementById("userIn").value;
    const amt = parseInt(document.getElementById("amtIn").value);
    await db.collection("users").doc(user).set({ saldo: firebase.firestore.FieldValue.increment(amt) }, {merge:true});
    alert("Saldo ditambahkan!");
}
</script>
</body>
</html>
