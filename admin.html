<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 ADMIN PRIVAT KONTROL</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background:#0a0a1f; color:white; text-align:center; margin:0; padding:15px; }
        .container { max-width:700px; margin:auto; background:#1a1a2e; padding:20px; border:4px solid #ef4444; border-radius:15px; }
        button { width:100%; padding:15px; margin:10px 0; font-size:16px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-blue { background:#22d3ee; color:black; }
        input { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; font-family:inherit; text-align:center; }
        .monitor-box { background: #282846; border: 2px dashed #facc15; padding: 15px; border-radius: 8px; margin: 20px 0; font-size: 12px; }
        .live-mult { font-size: 40px; color: #facc15; margin: 15px 0; text-shadow: 0 0 8px #facc15; }
        .wd-box { background:#1e1e38; border:2px solid #ef4444; padding:10px; margin:10px 0; border-radius:8px; font-size:11px; text-align:left; line-height:1.6; }
        .wd-buttons { display:flex; gap:10px; margin-top:10px; }
        .wd-buttons button { padding:8px; font-size:11px; margin:0; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 ADMIN SPACEMAN</h1>
    <div class="monitor-box">
        <h3>📺 LIVE KONTROL GAME</h3>
        <div id="statusMulai" style="color: #facc15;">⏱️ Status: WAITING</div>
        <div class="live-mult" id="adminLiveMult">1.00x</div>
        <button onclick="adminStartGame()" class="btn-green">🚀 TERBANGKAN ROKET (START)</button>
        <button onclick="adminCrashGame()" class="btn-red">💥 BIKIN MELEDAK (CRASH)</button>
        <button onclick="adminResetRoom()" class="btn-blue">🔄 RESET ROUND BARU</button>
    </div>

    <div class="monitor-box" style="border-color:#ef4444;">
        <h3>📥 PERMINTAAN WD (TARIK SALDO)</h3>
        <div id="wdList">Menunggu permintaan penarikan...</div>
    </div>

    <h3>💰 Tambah Saldo</h3>
    <input type="text" id="targetUser" placeholder="Username">
    <input type="number" id="addAmount" placeholder="Jumlah Saldo">
    <button onclick="addSaldo()" class="btn-green">TAMBAH SALDO</button>
</div>

<script>
// Konfigurasi otomatis mengarah ke 'spaceman-sukses'
const firebaseConfig = {
  apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM",
  authDomain: "spaceman-sukses.firebaseapp.com",
  projectId: "spaceman-sukses",
  storageBucket: "spaceman-sukses.firebasestorage.app",
  messagingSenderId: "442967300277",
  appId: "1:442967300277:web:65b99aebdbc478455586fc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let adminLoop = null; let currentMult = 1.00;

db.collection("game_room").doc("live_match").onSnapshot((doc) => {
    if (!doc.exists) return;
    const data = doc.data(); document.getElementById('adminLiveMult').textContent = (data.currentMultiplier || 1.00).toFixed(2) + "x";
    if (data.status === "TERBANG") { document.getElementById('statusMulai').textContent = "🚀 Roket terbang..."; document.getElementById('statusMulai').style.color = "#22d3ee"; }
    else if (data.status === "CRASH") { document.getElementById('statusMulai').textContent = "💥 CRASHED!"; document.getElementById('statusMulai').style.color = "#ef4444"; }
    else { document.getElementById('statusMulai').textContent = "⏱️ Status: WAITING"; document.getElementById('statusMulai').style.color = "#facc15"; }
});

function adminStartGame() {
    clearInterval(adminLoop); currentMult = 1.00;
    db.collection("game_room").doc("live_match").set({ status: "TERBANG", currentMultiplier: currentMult });
    adminLoop = setInterval(() => { currentMult += 0.08; db.collection("game_room").doc("live_match").update({ currentMultiplier: currentMult }); }, 100);
}
function adminCrashGame() { clearInterval(adminLoop); db.collection("game_room").doc("live_match").update({ status: "CRASH" }); }
function adminResetRoom() { clearInterval(adminLoop); db.collection("game_room").doc("live_match").set({ status: "WAITING", currentMultiplier: 1.00 }); }

async function addSaldo() {
    const user = document.getElementById('targetUser').value.trim().toLowerCase();
    const amount = parseInt(document.getElementById('addAmount').value);
    if (!user || !amount) return alert("Isi data!");
    await db.collection("users").doc(user).set({saldo: firebase.firestore.FieldValue.increment(amount)}, {merge: true});
    alert(`✅ Berhasil tambah Rp ${amount} ke ${user}`);
}

// MENDENGARKAN PERMINTAAN WD SECARA REAL-TIME
db.collection("withdraw_requests").where("status", "==", "PENDING").onSnapshot((snapshot) => {
    const wdListDiv = document.getElementById("wdList");
    if (snapshot.empty) {
        wdListDiv.innerHTML = "<p style='color:#64748b;'>Belum ada permintaan WD aktif.</p>";
        return;
    }
    
    let html = "";
    snapshot.forEach((doc) => {
        const data = doc.data();
        html += `
            <div class="wd-box">
                📌 <b>User:</b> ${data.username}<br>
                💰 <b>Jumlah:</b> Rp ${data.jumlah.toLocaleString()}<br>
                🏦 <b>Tujuan:</b> ${data.tujuan}<br>
                💳 <b>No Rek:</b> ${data.rekening}<br>
                <div class="wd-buttons">
                    <button class="btn-green" onclick="prosesWD('${doc.id}', '${data.username}', ${data.jumlah}, 'YA')">YA (Setuju)</button>
                    <button class="btn-red" onclick="prosesWD('${doc.id}', '${data.username}', ${data.jumlah}, 'TIDAK')">TIDAK (Tolak)</button>
                </div>
            </div>
        `;
    });
    wdListDiv.innerHTML = html;
});

async function prosesWD(requestId, username, jumlah, keputusan) {
    if (keputusan === "YA") {
        await db.collection("withdraw_requests").doc(requestId).update({ status: "BERHASIL" });
        alert(`✅ WD User ${username} sebesar Rp ${jumlah.toLocaleString()} TELAH DISETUJUI! Silakan kirimkan uangnya secara manual.`);
    } else {
        await db.collection("users").doc(username).update({
            saldo: firebase.firestore.FieldValue.increment(jumlah)
        });
        await db.collection("withdraw_requests").doc(requestId).update({ status: "DITOLAK" });
        alert(`❌ WD User ${username} DITOLAK. Saldo dibalikin.`);
    }
}
</script>
</body>
</html>
