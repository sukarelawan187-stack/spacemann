<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄 MAHJONG SCATTER PLAYER</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght=500;700&display=swap');
        body { font-family: 'Chakra Petch', sans-serif; background:#040d1a; color:white; text-align:center; margin:0; padding:10px; }
        .container { max-width:550px; margin:auto; background:#0b192e; padding:15px; border:3px solid #facc15; border-radius:15px; position: relative; }
        button { width:100%; padding:15px; margin:8px 0; font-size:16px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; font-family:inherit; }
        .btn-gold { background: linear-gradient(to bottom, #ffe066, #facc15); color:black; text-shadow: 0 1px 2px white; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-blue { background:#22d3ee; color:black; }
        input { width:90%; padding:12px; margin:8px 0; background:#1e293b; color:white; border:1px solid #475569; border-radius:8px; font-family:inherit; text-align:center; font-size:16px; }
        .slot-machine { background: #020617; border: 4px solid #b45309; border-radius: 12px; padding: 15px; margin: 15px 0; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; box-shadow: inset 0 0 20px rgba(0,0,0,0.9); }
        .slot-tile { background: #f8fafc; color: #0f172a; font-size: 45px; height: 90px; display: flex; justify-content: center; align-items: center; border-radius: 8px; border-bottom: 6px solid #cbd5e1; font-weight: bold; transition: transform 0.1s; }
        .spinning { animation: blurSpin 0.1s infinite alternate; }
        @keyframes blurSpin { from { transform: translateY(-5px); filter: blur(2px); } to { transform: translateY(5px); filter: blur(2px); } }
        .bigwin-overlay { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0, 0, 0, 0.9); color: #facc15; flex-direction: column; justify-content: center; align-items: center; z-index: 11; font-size: 28px; font-weight:bold; text-shadow: 0 0 20px #facc15; border-radius:15px; }
        .status-box { background:#1e293b; padding:10px; border-radius:8px; font-weight:bold; margin:10px 0; font-size:14px; color:#38bdf8; }
        .chat-panel { margin-top: 15px; background: #0f172a; border-radius: 8px; padding: 10px; border: 1px solid #334155; text-align: left; }
        .chat-box { height: 110px; overflow-y: auto; background: #020617; padding: 8px; border-radius: 6px; font-size: 12px; line-height: 1.6; margin-bottom: 8px; color:#cbd5e1; }
    </style>
</head>
<body>
<div class="container">
    <button onclick="window.location.href='index.html'" class="btn-red" style="padding:8px; font-size:12px; width:40%; margin-bottom:10px;">⬅️ MENU UTAMA</button>
    
    <div id="bigwinScreen" class="bigwin-overlay">🀄 MAHJONG JACKPOT!<br>💥 SCATTER BIG WIN 💥<br><br><span id="bigwinValue" style="color:white; font-size:20px;">Rp 0</span></div>
    
    <h2>🀄 MAHJONG SCATTER</h2>
    
    <div id="gamePage">
        <p>User: <b id="currUser" style="color:#facc15;"></b> | Saldo: <span id="saldo" style="color:#22c55e; font-weight:bold;">Rp 0</span></p>

        <div class="slot-machine">
            <div id="tile1" class="slot-tile">🀄</div>
            <div id="tile2" class="slot-tile">🀄</div>
            <div id="tile3" class="slot-tile">🀄</div>
        </div>

        <div id="statusGame" class="status-box">SILAKAN PASANG TARUHAN & SPIN!</div>

        <label style="font-size:12px; color:#94a3b8;">JUMLAH TARUHAN (BET):</label>
        <input type="number" id="taruhan" value="5000">

        <button id="spinBtn" onclick="mulaiSpin()" class="btn-gold" style="font-size:20px; padding:20px;">🎰 SPIN / PUTAR</button>

        <div class="chat-panel">
            <div id="chatContainer" class="chat-box"></div>
            <div style="display:flex; gap:5px;">
                <input type="text" id="chatMessage" placeholder="Obrolan sesama player..." style="width:75%; margin:0; padding:8px; font-size:12px;">
                <button onclick="kirimPesanChat()" class="btn-blue" style="width:25%; margin:0; padding:8px; font-size:12px; border-radius:8px;">KIRIM</button>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAzJ6p_stDYeaviIK1CapIpz_pc8onN5hM",
  authDomain: "spaceman-sukses.firebaseapp.com",
  projectId: "spaceman-sukses",
  storageBucket: "spaceman-sukses.firebasestorage.app",
  messagingSenderId: "442967300277",
  appId: "1:442967300277:web:65b99aebdbc478455586fc"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const currentUser = localStorage.getItem("game_user");
if(!currentUser) { alert("Silakan Login Terlebih Dahulu!"); window.location.href="index.html"; }
else { document.getElementById("currUser").textContent = currentUser; }

let currentSaldo = 0;
const kumpulanSimbol = ["🀀", "🀁", "🀂", "🀃", "🀆", "🀅", "🀄", "🀇", "🀏"];

db.collection("users").doc(currentUser).onSnapshot((doc) => {
    if(doc.exists) {
        currentSaldo = doc.data().saldo || 0;
        document.getElementById('saldo').textContent = `Rp ${currentSaldo.toLocaleString()}`;
        if(doc.data().isBanned === true) { alert("Akun diblokir!"); window.location.href="index.html"; }
    }
});

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    try {
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'spin') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.5); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.5); }
        else if (type === 'win') { osc.frequency.setValueAtTime(523, audioCtx.currentTime); osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1); osc.frequency.setValueAtTime(783, audioCtx.currentTime + 0.2); gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.4); }
        else if (type === 'scatter') {
            let t = audioCtx.currentTime;
            [523, 659, 783, 1046, 1318].forEach((f, i) => {
                let o = audioCtx.createOscillator(); let g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, t + (i*0.06)); g.gain.setValueAtTime(0.3, t + (i*0.06)); o.start(t + (i*0.06)); o.stop(t + (i*0.06) + 0.1);
            });
        }
    } catch(e){}
}

function listenToChat() {
    db.collection("live_chat").orderBy("waktu", "asc").limitToLast(15).onSnapshot((snapshot) => {
        const box = document.getElementById("chatContainer"); let html = "";
        snapshot.forEach((doc) => { const d = doc.data(); html += `<div style="margin-bottom:4px;"><b>[${d.user}]:</b> ${d.msg}</div>`; });
        box.innerHTML = html; box.scrollTop = box.scrollHeight;
    });
}
async function kirimPesanChat() {
    const text = document.getElementById("chatMessage").value.trim(); if(!text) return;
    document.getElementById("chatMessage").value = "";
    await db.collection("live_chat").add({ user: currentUser, msg: text, waktu: firebase.firestore.FieldValue.serverTimestamp() });
}
listenToChat();

async function mulaiSpin() {
    const bet = parseInt(document.getElementById("taruhan").value);
    if (bet < 2000) return alert("❌ Minimal Taruhan Rp 2.000!");
    if (bet > currentSaldo) return alert("❌ Saldo tidak cukup!");

    document.getElementById("spinBtn").disabled = true;
    document.getElementById("statusGame").textContent = "⚡ SEDANG MEMUTAR UBIN MAHJONG...";
    playSound('spin');

    await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(-bet) });
    await db.collection("mahjong_bets").doc(currentUser).set({ username: currentUser, jumlah: bet, waktu: firebase.firestore.FieldValue.serverTimestamp() });

    const t1 = document.getElementById("tile1"); const t2 = document.getElementById("tile2"); const t3 = document.getElementById("tile3");
    t1.classList.add("spinning"); t2.classList.add("spinning"); t3.classList.add("spinning");

    const rtpDoc = await db.collection("game_room").doc("mahjong_settings").get();
    let statusZonkPaksa = false;
    if(rtpDoc.exists && rtpDoc.data().forceZonk === true) { statusZonkPaksa = true; }

    setTimeout(async () => {
        t1.classList.remove("spinning"); t2.classList.remove("spinning"); t3.classList.remove("spinning");

        let s1, s2, s3;
        if (statusZonkPaksa) {
            s1 = kumpulanSimbol[Math.floor(Math.random() * 6)];
            s2 = kumpulanSimbol[Math.floor(Math.random() * 6)];
            s3 = kumpulanSimbol[Math.floor(Math.random() * 6)];
        } else {
            s1 = kumpulanSimbol[Math.floor(Math.random() * kumpulanSimbol.length)];
            s2 = kumpulanSimbol[Math.floor(Math.random() * kumpulanSimbol.length)];
            s3 = kumpulanSimbol[Math.floor(Math.random() * kumpulanSimbol.length)];
        }

        t1.textContent = s1; t2.textContent = s2; t3.textContent = s3;

        let hitungScatter = 0;
        if(s1 === "🀄") hitungScatter++;
        if(s2 === "🀄") hitungScatter++;
        if(s3 === "🀄") hitungScatter++;

        let totalKemenangan = 0;

        if (hitungScatter === 3) {
            totalKemenangan = bet * 10;
            playSound('scatter');
            document.getElementById("bigwinValue").textContent = `🎉 +Rp ${totalKemenangan.toLocaleString()} (JACKPOT 3 SCATTER)`;
            document.getElementById("bigwinScreen").style.display = "flex";
            setTimeout(() => { document.getElementById("bigwinScreen").style.display = "none"; }, 3500);
            document.getElementById("statusGame").textContent = `🔥 MANTAP! JACKPOT 3 SCATTER MENANG Rp ${totalKemenangan.toLocaleString()}`;
        } 
        else if (hitungScatter === 2) {
            totalKemenangan = bet * 3;
            playSound('win');
            document.getElementById("statusGame").textContent = `🎉 MENANG! Dapat 2 Scatter, Untung Rp ${totalKemenangan.toLocaleString()}`;
        }
        else if (s1 === s2 && s2 === s3) {
            totalKemenangan = bet * 5;
            playSound('win');
            document.getElementById("statusGame").textContent = `🎉 KEMBAR TIGA! Menang Rp ${totalKemenangan.toLocaleString()}`;
        }
        else {
            document.getElementById("statusGame").textContent = "❌ Belum Beruntung, Coba Spin Lagi!";
        }

        if (totalKemenangan > 0) {
            await db.collection("users").doc(currentUser).update({ saldo: firebase.firestore.FieldValue.increment(totalKemenangan) });
        }
        document.getElementById("spinBtn").disabled = false;
    }, 1200);
}
</script>
</body>
</html>
